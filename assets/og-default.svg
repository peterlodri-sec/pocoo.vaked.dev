<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070b16"/>
      <stop offset="100%" style="stop-color:#0f1428"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#00d4ff" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#00d4ff" stroke-width="0.5" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#00d4ff" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#00d4ff" stroke-width="0.5" opacity="0.06"/>

  <!-- Glow bar -->
  <rect x="0" y="308" width="1200" height="14" fill="url(#glow)"/>

  <!-- Logo marks — top left -->
  <polygon points="80,70 130,155 30,155" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <circle cx="80" cy="115" r="3" fill="#00e660" opacity="0.9"/>

  <!-- Site name -->
  <text x="152" y="108" font-family="'SF Mono', 'Fira Code', monospace" font-size="28" fill="#00d4ff" opacity="0.9" letter-spacing="4">pocoo.vaked.dev</text>

  <!-- Main text -->
  <text x="80" y="300" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">agentic systems.</text>
  <text x="80" y="380" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" fill="#00d4ff" letter-spacing="-1">build in public.</text>

  <!-- Tagline -->
  <text x="82" y="460" font-family="'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="24" fill="#ffffff" opacity="0.45" letter-spacing="0.5">loops · compression · fine-tuning · open source</text>

  <!-- Bottom border accent -->
  <rect x="0" y="610" width="1200" height="3" fill="#00d4ff" opacity="0.4"/>
  <rect x="0" y="613" width="400" height="1" fill="#00e660" opacity="0.3"/>
</svg>
