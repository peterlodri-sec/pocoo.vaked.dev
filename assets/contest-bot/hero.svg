<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" font-family="Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="16"/>

  <!-- Terminal title bar -->
  <rect x="0" y="0" width="800" height="36" fill="#21262d" rx="16"/>
  <rect x="0" y="20" width="800" height="16" fill="#21262d"/>
  <circle cx="20" cy="18" r="6" fill="#ff7b72"/>
  <circle cx="40" cy="18" r="6" fill="#d2a8ff"/>
  <circle cx="60" cy="18" r="6" fill="#3fb950"/>
  <text x="400" y="23" text-anchor="middle" fill="#8b949e" font-size="12">contest-bot — Digital Freedom Contest</text>

  <!-- Terminal content -->
  <text x="24" y="68" fill="#58a6ff" font-size="14">$</text>
  <text x="40" y="68" fill="#e6edf3" font-size="14">uv run contest-bot</text>

  <text x="24" y="94" fill="#8b949e" font-size="13">[INFO] Database initialized</text>
  <text x="24" y="112" fill="#8b949e" font-size="13">[INFO] ContestBot starting...</text>
  <text x="24" y="130" fill="#3fb950" font-size="13">✓ Bot is live — waiting for submissions...</text>

  <!-- Divider -->
  <line x1="24" y1="150" x2="776" y2="150" stroke="#30363d" stroke-width="1"/>

  <!-- Incoming submission -->
  <text x="24" y="176" fill="#d2a8ff" font-size="13">┌────────────────────────────────────────────┐</text>
  <text x="24" y="196" fill="#d2a8ff" font-size="13">│ 📩 New submission from @alice              │</text>
  <text x="24" y="216" fill="#d2a8ff" font-size="13">│    YouTube  ·  "Digital Freedom Basics"    │</text>
  <text x="24" y="236" fill="#d2a8ff" font-size="13">│    Status: pending  ·  Views: 12,450       │</text>
  <text x="24" y="256" fill="#d2a8ff" font-size="13">└────────────────────────────────────────────┘</text>

  <!-- Divider -->
  <line x1="24" y1="274" x2="776" y2="274" stroke="#30363d" stroke-width="1"/>

  <!-- Admin stats -->
  <text x="24" y="300" fill="#58a6ff" font-size="14">$</text>
  <text x="40" y="300" fill="#e6edf3" font-size="14">/admin graph</text>

  <text x="24" y="326" fill="#e6edf3" font-size="13">📊 Knowledge Graph generated</text>
  <text x="24" y="348" fill="#8b949e" font-size="12">   3 platforms · 12 submissions · 7 users</text>
  <text x="24" y="368" fill="#8b949e" font-size="12">   SVG: 28 KB · 142 nodes · 89 edges</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="408" width="800" height="12" fill="url(#accent)" opacity="0.4" rx="6"/>
  <text x="400" y="396" text-anchor="middle" fill="#3fb950" font-size="11">open source · MIT · fork it → github.com/peterlodri-sec/telegram-contest</text>
</svg>
