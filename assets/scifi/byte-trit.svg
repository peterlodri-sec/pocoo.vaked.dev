<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420" font-family="ui-monospace,Menlo,monospace"><rect width="1000" height="420" fill="#070b16"/><text x="60" y="60" fill="#c8d4e8" font-size="26" font-weight="700">one node = one byte &#183; one edge = one trit</text><text x="60" y="106" fill="#5a6b8c" font-size="15">node activation &#8212; int8</text><rect x="60" y="120" width="60" height="60" rx="8" fill="#00d4ff" opacity="1"/><text x="90.0" y="156.0" fill="#070b16" font-size="22" text-anchor="middle" font-weight="700">1</text><rect x="128" y="120" width="60" height="60" rx="8" fill="#1b2740" opacity="0.5"/><text x="158.0" y="156.0" fill="#5a6b8c" font-size="22" text-anchor="middle" font-weight="700">0</text><rect x="196" y="120" width="60" height="60" rx="8" fill="#00d4ff" opacity="1"/><text x="226.0" y="156.0" fill="#070b16" font-size="22" text-anchor="middle" font-weight="700">1</text><rect x="264" y="120" width="60" height="60" rx="8" fill="#00d4ff" opacity="1"/><text x="294.0" y="156.0" fill="#070b16" font-size="22" text-anchor="middle" font-weight="700">1</text><rect x="332" y="120" width="60" height="60" rx="8" fill="#1b2740" opacity="0.5"/><text x="362.0" y="156.0" fill="#5a6b8c" font-size="22" text-anchor="middle" font-weight="700">0</text><rect x="400" y="120" width="60" height="60" rx="8" fill="#1b2740" opacity="0.5"/><text x="430.0" y="156.0" fill="#5a6b8c" font-size="22" text-anchor="middle" font-weight="700">0</text><rect x="468" y="120" width="60" height="60" rx="8" fill="#00d4ff" opacity="1"/><text x="498.0" y="156.0" fill="#070b16" font-size="22" text-anchor="middle" font-weight="700">1</text><rect x="536" y="120" width="60" height="60" rx="8" fill="#1b2740" opacity="0.5"/><text x="566.0" y="156.0" fill="#5a6b8c" font-size="22" text-anchor="middle" font-weight="700">0</text><text x="60" y="214" fill="#5a6b8c" font-size="14">8 bits &#8594; a signed level in [-128, 127]</text><text x="60" y="286" fill="#5a6b8c" font-